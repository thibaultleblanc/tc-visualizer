services:
  web:
    build:
      context: .
      target: dev
    container_name: tc-visualizer-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      - VITE_HMR_HOST=localhost
      - VITE_HMR_PORT=5173

  preview:
    build:
      context: .
      target: dev
    container_name: tc-visualizer-preview
    ports:
      - "5174:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      - VITE_HMR_HOST=localhost
      - VITE_HMR_PORT=5174
